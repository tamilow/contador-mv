<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>cuánto falta? ☁️</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Comfortaa',cursive;
background:linear-gradient(180deg,#dff6ff,#a8dcff,#7ec4f5);
display:flex;
justify-content:center;
align-items:center;
cursor:url("https://cur.cursors-4u.net/cursors/cur-13/cur1143.cur"),auto;
}

/* contenedor */

.container{
text-align:center;
background:rgba(255,255,255,0.65);
backdrop-filter:blur(10px);
padding:50px;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
z-index:2;
}

h1{
font-family:'Pacifico',cursive;
font-size:2.5em;
color:#2a6fa6;
margin-bottom:10px;
}

/* boton */

button{
padding:15px 35px;
border:none;
border-radius:30px;
font-size:1.3em;
background:#6ec1f4;
color:white;
font-family:'Comfortaa';
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4da6e0;
transform:scale(1.05);
}

/* contador */

#countdown{
margin-top:30px;
display:none;
}

/* cajas */

.timebox{
display:inline-block;
background:rgba(255,255,255,0.9);
padding:20px;
margin:10px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
min-width:90px;
animation:float 4s ease-in-out infinite;
}

.number{
font-size:2.5em;
color:#1e5f8a;
font-weight:700;
}

.label{
font-size:0.9em;
color:#4d7ea8;
}

.timebox:nth-child(2){animation-delay:0.5s;}
.timebox:nth-child(3){animation-delay:1s;}
.timebox:nth-child(4){animation-delay:1.5s;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* nubes */

.cloud{
position:absolute;
font-size:90px;
opacity:0.6;
animation:flotar 60s linear infinite;
}

.cloud:nth-child(1){top:10%;left:-200px;}
.cloud:nth-child(2){top:40%;left:-300px;animation-duration:80s;}
.cloud:nth-child(3){top:70%;left:-250px;animation-duration:100s;}

@keyframes flotar{
from{transform:translateX(0);}
to{transform:translateX(120vw);}
}

/* particulas */

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.7;
animation:subir linear infinite;
}

@keyframes subir{
from{transform:translateY(100vh);opacity:0;}
10%{opacity:0.6;}
to{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<div class="cloud">☁️</div>
<div class="cloud">☁️</div>
<div class="cloud">☁️</div>

<div class="container">

<h1>contador para mvd</h1>

<button onclick="mostrarContador()">hola, cata!</button>

<div id="countdown">

<div class="timebox">
<div class="number" id="days">0</div>
<div class="label">días</div>
</div>

<div class="timebox">
<div class="number" id="hours">0</div>
<div class="label">horas</div>
</div>

<div class="timebox">
<div class="number" id="minutes">0</div>
<div class="label">min</div>
</div>

<div class="timebox">
<div class="number" id="seconds">0</div>
<div class="label">seg</div>
</div>

</div>

</div>

<script>

function mostrarContador(){
document.getElementById("countdown").style.display="block";
}

function actualizarCuenta(){

const fechaObjetivo=new Date("April 2, 2026 00:00:00").getTime();
const ahora=new Date().getTime();
const diferencia=fechaObjetivo-ahora;

const dias=Math.floor(diferencia/(1000*60*60*24));
const horas=Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos=Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos=Math.floor((diferencia%(1000*60))/1000);

document.getElementById("days").innerText=dias;
document.getElementById("hours").innerText=horas;
document.getElementById("minutes").innerText=minutos;
document.getElementById("seconds").innerText=segundos;

}

setInterval(actualizarCuenta,1000);
actualizarCuenta();

/* particulas */

function crearParticula(){

const p=document.createElement("div");
p.classList.add("particle");

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(p);

setTimeout(()=>{p.remove()},10000);

}

setInterval(crearParticula,200);

</script>

</body>
</html>

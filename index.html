<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>mvd countdown</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Quicksand',sans-serif;
background:linear-gradient(#cfefff,#9ed7ff);
overflow:hidden;
text-align:center;
cursor:url("https://cur.cursors-4u.net/nature/nat-10/nat988.cur"),auto;
}

/* nubes */

.cloud{
position:absolute;
opacity:0.6;
animation:moveCloud linear infinite;
}

@keyframes moveCloud{
from{
transform:translateX(-200px);
}
to{
transform:translateX(110vw);
}
}

/* particulas */

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.6;
animation:floatParticle 8s linear infinite;
}

@keyframes floatParticle{
from{
transform:translateY(0);
opacity:0;
}
50%{
opacity:1;
}
to{
transform:translateY(-300px);
opacity:0;
}
}

/* caja principal */

.box{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(8px);
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:90%;
}

h1{
font-family:'Pacifico',cursive;
color:#3a7fb0;
font-size:28px;
margin-bottom:25px;
}

button{
background:#7fc8ff;
border:none;
padding:14px 28px;
border-radius:20px;
font-size:18px;
font-family:'Quicksand',sans-serif;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5bb6ff;
transform:scale(1.05);
}

.counter{
margin-top:25px;
font-size:40px;
color:#2c6d9c;
font-family:'Pacifico',cursive;
}

/* responsive celular */

@media (max-width:600px){

h1{
font-size:22px;
}

button{
font-size:16px;
padding:12px 22px;
}

.counter{
font-size:32px;
}

.box{
padding:25px;
}

}

</style>
</head>

<body>

<div id="cloudContainer"></div>

<div class="box">

<h1>hola cata :3 estás ansiosa?</h1>

<button onclick="mostrar()">¿cuánto falta?</button>

<div class="counter" id="contador"></div>

</div>

<script>

/* contador */

function mostrar(){

const fecha = new Date("April 2, 2026 00:00:00").getTime()

const ahora = new Date().getTime()

const diferencia = fecha - ahora

const dias = Math.floor(diferencia / (1000*60*60*24))

document.getElementById("contador").innerHTML = dias + " días"

}

/* nubes irregulares */

const container = document.getElementById("cloudContainer")

function crearNube(){

const nube = document.createElement("div")

nube.className="cloud"
nube.innerHTML="☁️"

const size = Math.random()*70 + 40
const top = Math.random()*80
const duracion = Math.random()*40 + 40

nube.style.fontSize = size+"px"
nube.style.top = top+"vh"
nube.style.animationDuration = duracion+"s"

container.appendChild(nube)

setTimeout(()=>{
nube.remove()
},duracion*1000)

}

setInterval(crearNube,4000)

/* particulas */

function crearParticula(){

const p = document.createElement("div")
p.className="particle"

p.style.left = Math.random()*100+"vw"
p.style.top = "100vh"

document.body.appendChild(p)

setTimeout(()=>{
p.remove()
},8000)

}

setInterval(crearParticula,500)

</script>

</body>
</html>

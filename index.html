<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuenta regresiva para MVD 💙</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg,#bfe9ff,#6fb6e9);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#0c3c60;
}

.container{
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    max-width:500px;
}

h1{
    margin-top:0;
    font-size:2em;
}

#countdown{
    font-size:3em;
    font-weight:bold;
    margin:20px 0;
    color:#084c7a;
}

.subtitle{
    font-size:1.2em;
}

.heart{
    font-size:2em;
    animation:latido 1.8s infinite;
}

@keyframes latido{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.cloud{
    position:absolute;
    opacity:0.3;
    font-size:60px;
}

.cloud1{top:10%; left:10%;}
.cloud2{bottom:15%; right:12%;}
</style>
</head>

<body>

<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>

<div class="container">
<h1>Cuenta regresiva para MVD ✨</h1>

<div id="countdown">...</div>

<div class="subtitle">
para el <b>2 de abril de 2026</b>
</div>

<div class="heart">💙</div>
</div>

<script>
function actualizarCuenta(){
    const fechaObjetivo = new Date("April 2, 2026 00:00:00").getTime();
    const ahora = new Date().getTime();

    const diferencia = fechaObjetivo - ahora;

    const dias = Math.floor(diferencia / (1000*60*60*24));
    const horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
    const minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
    const segundos = Math.floor((diferencia % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
        dias + " días<br>" +
        horas + "h " + minutos + "m " + segundos + "s";

    if(diferencia < 0){
        document.getElementById("countdown").innerHTML =
        "¡Llegó el día! 💙";
    }
}

setInterval(actualizarCuenta,1000);
actualizarCuenta();
</script>

</body>
</html>
